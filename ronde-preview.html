<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ronde-preview (standalone)</title>
  <!-- Standalone visuele check van de Schoonmaakronde-overlay. Geen Firebase,
       puur de echte styles.css op statische sample-markup. Niet gelinkt vanuit
       de app; alleen voor visuele review (zoals keuringen-preview.html). -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="round-overlay show" style="background:var(--bg-page);">
    <div class="round-content">
      <header class="round-header">
        <div class="round-header-top">
          <div class="round-title-block">
            <span class="round-title">Schoonmaakronde</span>
            <span class="round-progress-label">1 van 53</span>
          </div>
          <button class="round-close-btn" aria-label="Sluiten">×</button>
        </div>
        <div class="round-progress-bar"><div class="round-progress-fill" style="width:2%"></div></div>
      </header>

      <article class="round-card" style="--area-color:#6b8e23;">
        <div class="round-card-pills">
          <span class="area-badge" style="--area-color:#6b8e23;"><span class="area-icon" aria-hidden="true">📦</span>Algemeen productie</span>
          <span class="today-freq-pill">Maandelijks</span>
        </div>
        <h2 class="round-card-title">Blus apparatuur</h2>
        <p class="round-card-desc">Afnemen met vochtige doek</p>
        <p class="round-card-meta">📍 algemeen</p>
        <div class="round-card-image-wrap">
          <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 600'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23d7e3da'/%3E%3Cstop offset='1' stop-color='%23b9cdbe'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='800' height='600' fill='url(%23g)'/%3E%3Ctext x='400' y='318' font-family='sans-serif' font-size='44' fill='%235a6b60' text-anchor='middle'%3EFoto van de taak%3C/text%3E%3C/svg%3E" class="round-card-image" alt="">
        </div>
        <dl class="round-card-details">
          <div class="round-detail"><dt>Wanneer</dt><dd>Tijdens productie</dd></div>
          <div class="round-detail"><dt>Methode</dt><dd>Handmatig</dd></div>
          <div class="round-detail"><dt>Middel</dt><dd>Vochtige doek</dd></div>
          <div class="round-detail"><dt>PBM</dt><dd>🧤 Handschoenen</dd></div>
        </dl>
        <div class="round-note-block">
          <label class="round-note-label" for="np">Opmerking</label>
          <textarea id="np" class="round-note-input" rows="2" placeholder="Optioneel: opmerking bij deze afvink…"></textarea>
        </div>
      </article>

      <footer class="round-footer">
        <button class="round-btn round-btn-prev">◀ Vorige</button>
        <button class="round-btn round-btn-skip">↷ Overslaan</button>
        <button class="round-btn round-btn-check">✓ Klaar</button>
        <button class="round-btn round-btn-next">Volgende ▶</button>
      </footer>
    </div>
  </div>
</body>
</html>
